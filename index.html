<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Produktkatalog</title>
    <style>
        /* Färgteman */
        :root {
            --primary-color: rgb(88, 197, 202);
            --primary-dark: rgb(68, 167, 172);
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --text-title: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
            --tree-hover: #f1f5f9;
            --tree-active-bg: rgba(88, 197, 202, 0.1);
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --dropdown-shadow: rgba(0, 0, 0, 0.08);
            
            /* Diskret grön för primärsortiment (Ljust tema) */
            --primar-bg: rgba(34, 197, 94, 0.08);
            --primar-text: #166534;

            /* Diskret röd för utgångna produkter (Ljust tema) */
            --utgatt-bg: rgba(239, 68, 68, 0.08);
            --utgatt-text: #991b1b;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #242424;
            --text-color: #bbbbbb;
            --text-title: #ffffff;
            --text-muted: #888888;
            --border-color: #333333;
            --input-bg: #2d2d2d;
            --tree-hover: #2d2d2d;
            --tree-active-bg: rgba(88, 197, 202, 0.15);
            --danger-color: #f87171;
            --danger-hover: #ef4444;
            --dropdown-shadow: rgba(0, 0, 0, 0.4);
            
            /* Diskret grön för primärsortiment (Mörkt tema) */
            --primar-bg: rgba(34, 197, 94, 0.1);
            --primar-text: #4ade80;

            /* Diskret röd för utgångna produkter (Mörkt tema) */
            --utgatt-bg: rgba(239, 68, 68, 0.15);
            --utgatt-text: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 30px 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header & Sök */
        header {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.02);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-top {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        @media (min-width: 992px) {
            .header-top {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .header-title h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-title);
        }

        .header-title p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 700px;
        }

        .search-bar {
            position: relative;
            width: 100%;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 24px;
            border: 2px solid var(--border-color);
            border-radius: 50px;
            font-size: 15px;
            outline: none;
            background: var(--input-bg);
            color: var(--text-title);
        }

        .search-bar input:focus {
            background: var(--card-bg);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(88, 197, 202, 0.15);
        }

        /* Filterrad */
        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            width: 100%;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            align-items: center;
        }

        /* Custom Sökbar Dropdown Struktur */
        .custom-dropdown {
            position: relative;
            width: 100%;
        }

        .dropdown-trigger {
            width: 100%;
            padding: 10px 30px 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--input-bg);
            color: var(--text-title);
            font-size: 13px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
        }

        .dropdown-trigger::after {
            content: "▼";
            font-size: 9px;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .custom-dropdown.active .dropdown-trigger {
            border-color: var(--primary-color);
            background-color: var(--card-bg);
        }

        .dropdown-menu-content {
            display: none;
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            width: 100%;
            min-width: 220px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 25px var(--dropdown-shadow);
            z-index: 500;
            padding: 8px;
        }

        .custom-dropdown.active .dropdown-menu-content {
            display: block;
        }

        .dropdown-search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-title);
            font-size: 13px;
            margin-bottom: 6px;
            outline: none;
        }

        .dropdown-search-input:focus {
            border-color: var(--primary-color);
        }

        .dropdown-options-list {
            max-height: 200px;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .dropdown-option {
            padding: 8px 12px;
            font-size: 13px;
            color: var(--text-color);
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dropdown-option:hover {
            background: var(--tree-hover);
            color: var(--text-title);
        }

        .dropdown-option.selected {
            background: var(--tree-active-bg);
            color: var(--primary-color);
            font-weight: 600;
        }

        .dropdown-trigger.has-value {
            border-color: var(--primary-color);
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Knapp för att rensa filter (Mindre och mer kompakt bredd) */
        .clear-btn {
            display: none; /* Dold som standard, styrs via JS */
            background: transparent;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            white-space: nowrap;
            width: fit-content;
            justify-self: start;
        }

        .clear-btn:hover {
            background: var(--danger-color);
            color: white;
        }

        .theme-toggle-btn {
            background: var(--input-bg);
            border: 2px solid var(--border-color);
            color: var(--text-title);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .theme-toggle-btn:hover {
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        /* Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* Filterträd */
        .sidebar {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.02);
            height: fit-content;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .sidebar h3 {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-title);
        }

        .tree-menu, .tree-menu ul {
            list-style: none;
            padding-left: 0;
        }

        .tree-item {
            margin: 4px 0;
        }

        .tree-label {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-color);
            font-weight: 500;
            font-size: 14px;
        }

        .tree-label:hover {
            background: var(--tree-hover);
        }

        .tree-label.active {
            background: var(--tree-active-bg);
            color: var(--primary-color);
            font-weight: 600;
        }

        .toggle-arrow {
            margin-right: 8px;
            font-size: 11px;
            transition: transform 0.2s ease;
            display: inline-block;
            width: 12px;
            text-align: center;
        }

        .sub-menu {
            padding-left: 16px !important;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease-out;
        }

        .expanded > .sub-menu {
            max-height: 2500px;
        }

        .expanded > .tree-label .toggle-arrow {
            transform: rotate(90deg);
        }

        /* Galleri */
        .gallery-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        @media (max-width: 1300px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { .product-grid { grid-template-columns: 1fr; } }

        /* Produktkort */
        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid var(--border-color);
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            border-color: rgba(88, 197, 202, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease; 
        }

        .product-image {
            width: 100%;
            height: 180px;
            background: var(--input-bg);
            border-radius: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 10px;
        }

        .product-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .product-card:hover .product-image {
            background: var(--tree-hover);
        }

        .brand {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-title);
            margin-bottom: 4px;
            line-height: 1.4;
            height: 44px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .desc-preview {
            font-size: 13px;
            color: var(--text-muted);
            height: 36px;
            overflow: hidden;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Taggar-layout */
        .badge-container {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        /* Standardbricka för sortiment (Neutral grå) */
        .sortiment-badge {
            font-size: 12px;
            background: var(--input-bg);
            color: var(--text-color);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 500;
            border: 1px solid var(--border-color);
        }

        /* Primärsortiment */
        .sortiment-badge.primar-sortiment {
            background: var(--primar-bg);
            color: var(--primar-text);
            font-weight: 600;
            border-color: var(--border-color);
        }

        /* Utgått-status */
        .sortiment-badge.utgatt-status {
            background: var(--utgatt-bg);
            color: var(--utgatt-text);
            font-weight: 600;
            border-color: var(--border-color);
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(88, 197, 202, 0.15);
        }

        .btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 6px 16px rgba(88, 197, 202, 0.25);
        }

        /* Popup (Modal) */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            z-index: 1000;
        }

        .modal.open { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--card-bg); 
            color: var(--text-color);
            padding: 40px; border-radius: 24px;
            max-width: 900px; width: 95%; max-height: 90vh; overflow-y: auto;
            position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px;
            border: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            .modal-content { 
                grid-template-columns: 1fr; 
                padding: 30px 24px; 
                gap: 24px;
            }
        }

        .close-modal {
            position: absolute; top: 20px; right: 20px; font-size: 24px;
            cursor: pointer; border: none; background: var(--input-bg); color: var(--text-muted);
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
            border: 1px solid var(--border-color);
        }

        .close-modal:hover { background: var(--tree-hover); color: var(--text-title); transform: rotate(90deg); transition: transform 0.2s ease; }

        /* Teknisk Specifikation-tabell */
        .spec-table {
            width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px;
        }
        .spec-table tr { border-bottom: 1px solid var(--border-color); }
        .spec-table td { padding: 8px 4px; color: var(--text-color); }
        .spec-table td:first-child { font-weight: 600; color: var(--text-muted); width: 40%; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-top">
            <div class="header-title">
                <h2>Digital Produktkatalog</h2>
                <p id="product-count">Läser in artiklar...</p>
            </div>
            <div class="header-controls">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Sök på produkt, benämning, E-nummer, tillverkare...">
                </div>
                <button class="theme-toggle-btn" id="themeToggleBtn" title="Ändra färgtema">🌙</button>
            </div>
        </div>

        <div class="filter-row" id="filterRowBox">
            </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <h3>Produktgrupper</h3>
            <ul class="tree-menu" id="dynamicTree"></ul>
        </aside>

        <main class="gallery-container">
            <div class="product-grid" id="productGrid"></div>
        </main>
    </div>
</div>

<div class="modal" id="productModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-modal" onclick="closeModal()">&times;</button>
        
        <div id="modalImageBox" style="background: var(--input-bg); border-radius: 16px; display: flex; align-items: center; justify-content: center; height: 320px; border: 1px solid var(--border-color); padding: 10px; overflow: hidden;">
            <span style="font-size: 72px;">📦</span>
        </div>
        
        <div style="display: flex; flex-direction: column; justify-content: center;">
            <span id="modalBrand" class="brand">Tillverkare</span>
            <h2 id="modalTitle" style="margin: 5px 0 2px 0; font-size: 22px; color: var(--text-title);">Produkt</h2>
            <h3 id="modalSub" style="font-size: 15px; font-weight: 500; color: var(--text-muted); margin-bottom: 15px;">Benämning</h3>
            
            <div style="border-top: 1px solid var(--border-color); padding-top: 15px;">
                <h4 style="font-size: 12px; text-transform: uppercase; color: var(--text-title); letter-spacing: 0.5px;">Beskrivning</h4>
                <p id="modalDesc" style="color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-top: 5px;"></p>
            </div>

            <div style="margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 15px;">
                <h4 style="font-size: 12px; text-transform: uppercase; color: var(--text-title); letter-spacing: 0.5px;">Teknisk Specifikation</h4>
                <table class="spec-table" id="specTable"></table>
            </div>
        </div>
    </div>
</div>

<script>
    let products = [];
    let searchQuery = "";
    
    // Sätter "Primärsortiment" som förvalt standardfilter vid laddning
    let activeFilters = { 
        Huvudkategori: null, Kategori: null, Underkategori: null,
        Tillverkare: null, Leverantör: null, Sortiment: "Primärsortiment", Godkännande: null
    };

    const dropdownFields = [
        { key: "Tillverkare", label: "Alla Tillverkare" },
        { key: "Leverantör", label: "Alla Leverantörer" },
        { key: "Sortiment", label: "Alla Sortiment" },
        { key: "Huvudkategori", label: "Alla Huvudkategorier" },
        { key: "Kategori", label: "Alla Kategorier" },
        { key: "Underkategori", label: "Alla Underkategorier" },
        { key: "Godkännande", label: "Alla Godkännanden" }
    ];

    let dropdownSearchQueries = {
        Tillverkare: "", Leverantör: "", Sortiment: "",
        Huvudkategori: "", Kategori: "", Underkategori: "", Godkännande: ""
    };

    // THEME HANDLING
    const toggleBtn = document.getElementById('themeToggleBtn');
    const currentTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', currentTheme);
    toggleBtn.innerText = currentTheme === 'dark' ? '☀️' : '🌙';

    toggleBtn.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'light');
            toggleBtn.innerText = '🌙';
            localStorage.setItem('theme', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggleBtn.innerText = '☀️';
            localStorage.setItem('theme', 'dark');
        }
    });

    // 1. DATALADDNING
    function loadData() {
        const jsonUrl = "produkter.json"; 

        fetch(jsonUrl)
            .then(res => {
                if (!res.ok) throw new Error("Kunde inte läsa produkter.json");
                return res.json();
            })
            .then(data => {
                products = data.map((item, index) => {
                    item.rowId = index + 1;
                    return item;
                });
                
                buildDropdownHTML();      
                initGlobalCloseListener(); 
                updateUI();               
            })
            .catch(err => {
                console.error(err);
                document.getElementById('product-count').innerText = "Kunde inte ladda produktdatan.";
            });
    }

    // 2. FILTRERINGSMOTOR
    function getFilteredProducts(ignoreKey = null) {
        return products.filter(p => {
            if (ignoreKey !== "Huvudkategori" && activeFilters.Huvudkategori && (p.Huvudkategori || "Ospecificerat").trim() !== activeFilters.Huvudkategori) return false;
            if (ignoreKey !== "Kategori" && activeFilters.Kategori && (p.Kategori || "Ospecificerat").trim() !== activeFilters.Kategori) return false;
            if (ignoreKey !== "Underkategori" && activeFilters.Underkategori && (p.Underkategori || "Ospecificerat").trim() !== activeFilters.Underkategori) return false;
            if (ignoreKey !== "Tillverkare" && activeFilters.Tillverkare && (p.Tillverkare || "").trim() !== activeFilters.Tillverkare) return false;
            if (ignoreKey !== "Leverantör" && activeFilters.Leverantör && (p.Leverantör || "").trim() !== activeFilters.Leverantör) return false;
            if (ignoreKey !== "Sortiment" && activeFilters.Sortiment && (p.Sortiment || "").trim() !== activeFilters.Sortiment) return false;
            if (ignoreKey !== "Godkännande" && activeFilters.Godkännande && (p.Godkännande || "").trim() !== activeFilters.Godkännande) return false;

            if (searchQuery) {
                let searchStr = `${p.Produkt} ${p.Benämning} ${p["E-nummer"]} ${p.Tillverkare} ${p["Tillverkarens artikellnummer"]}`.toLowerCase();
                if (!searchStr.includes(searchQuery)) return false;
            }
            return true;
        });
    }

    // 3. SKAPA STRUKTUREN FÖR DE SÖKBARA MENYERNA
    function buildDropdownHTML() {
        const rowBox = document.getElementById('filterRowBox');
        rowBox.innerHTML = '';

        dropdownFields.forEach(field => {
            const wrap = document.createElement('div');
            wrap.className = 'custom-dropdown';
            wrap.id = `dropdown-wrapper-${field.key.replace(/[^a-zA-Z0-9]/g, '_')}`;

            wrap.innerHTML = `
                <button class="dropdown-trigger" id="trigger-${field.key.replace(/[^a-zA-Z0-9]/g, '_')}">${field.label}</button>
                <div class="dropdown-menu-content">
                    <input type="text" class="dropdown-search-input" placeholder="Sök i listan..." id="search-${field.key.replace(/[^a-zA-Z0-9]/g, '_')}">
                    <ul class="dropdown-options-list" id="options-${field.key.replace(/[^a-zA-Z0-9]/g, '_')}"></ul>
                </div>
            `;

            wrap.querySelector('.dropdown-trigger').addEventListener('click', (e) => {
                e.stopPropagation();
                const isActive = wrap.classList.contains('active');
                closeAllDropdownMenus();
                if (!isActive) {
                    wrap.classList.add('active');
                    wrap.querySelector('.dropdown-search-input').focus();
                }
            });

            wrap.querySelector('.dropdown-search-input').addEventListener('input', (e) => {
                dropdownSearchQueries[field.key] = e.target.value.toLowerCase();
                renderSingleDropdownOptions(field); 
            });

            rowBox.appendChild(wrap);
        });

        const clearBtn = document.createElement('button');
        clearBtn.className = 'clear-btn';
        clearBtn.id = 'clearFilterBtn';
        clearBtn.innerHTML = '❌ Rensa filter';
        clearBtn.onclick = resetAllFilters;
        rowBox.appendChild(clearBtn);
    }

    // 4. RENDERA ALTERNATIVEN I EN SPECIFIK DROPDOWN (Sorterad från A-Ö)
    function renderSingleDropdownOptions(field) {
        const safeId = field.key.replace(/[^a-zA-Z0-9]/g, '_');
        const listEl = document.getElementById(`options-${safeId}`);
        const triggerEl = document.getElementById(`trigger-${safeId}`);
        if (!listEl || !triggerEl) return;

        const pool = getFilteredProducts(field.key);
        let values = [...new Set(pool.map(p => p[field.key] ? p[field.key].toString().trim() : ""))];
        values = values.filter(v => v !== "");
        
        values.sort((a, b) => a.localeCompare(b, 'sv'));

        const localQuery = dropdownSearchQueries[field.key];
        if (localQuery) {
            values = values.filter(v => v.toLowerCase().includes(localQuery));
        }

        listEl.innerHTML = '';

        const allOpt = document.createElement('li');
        allOpt.className = `dropdown-option ${!activeFilters[field.key] ? 'selected' : ''}`;
        allOpt.textContent = field.label;
        allOpt.onclick = () => {
            activeFilters[field.key] = null;
            triggerEl.textContent = field.label;
            triggerEl.classList.remove('has-value');
            closeAllDropdownMenus();
            updateUI();
        };
        listEl.appendChild(allOpt);

        values.forEach(val => {
            const opt = document.createElement('li');
            const isSelected = activeFilters[field.key] === val;
            opt.className = `dropdown-option ${isSelected ? 'selected' : ''}`;
            opt.textContent = val;
            opt.title = val;
            
            opt.onclick = () => {
                activeFilters[field.key] = val;
                triggerEl.textContent = val;
                triggerEl.classList.add('has-value');
                closeAllDropdownMenus();
                updateUI();
            };
            listEl.appendChild(opt);
        });

        if (activeFilters[field.key]) {
            triggerEl.textContent = activeFilters[field.key];
            triggerEl.classList.add('has-value');
        } else {
            triggerEl.textContent = field.label;
            triggerEl.classList.remove('has-value');
        }
    }

    function updateAllDropdownOptions() {
        dropdownFields.forEach(field => renderSingleDropdownOptions(field));
    }

    function closeAllDropdownMenus() {
        document.querySelectorAll('.custom-dropdown').forEach(el => el.classList.remove('active'));
    }

    function initGlobalCloseListener() {
        document.addEventListener('click', () => closeAllDropdownMenus());
    }

    // 5. DYNAMISKT FILTERTRÄD (Sorterat från A-Ö)
    function buildDynamicTree() {
        const treeContainer = document.getElementById('dynamicTree');
        treeContainer.innerHTML = '';

        const allLi = document.createElement('li');
        allLi.className = 'tree-item';
        const isAllActive = !activeFilters.Huvudkategori && !activeFilters.Kategori && !activeFilters.Underkategori;
        allLi.innerHTML = `<div class="tree-label ${isAllActive ? 'active' : ''}" id="btn-all">📁 Visa alla produkter</div>`;
        allLi.onclick = () => {
            activeFilters.Huvudkategori = null;
            activeFilters.Kategori = null;
            activeFilters.Underkategori = null;
            updateUI();
        };
        treeContainer.appendChild(allLi);

        const currentPool = products.filter(p => {
            if (activeFilters.Tillverkare && (p.Tillverkare || "").trim() !== activeFilters.Tillverkare) return false;
            if (activeFilters.Leverantör && (p.Leverantör || "").trim() !== activeFilters.Leverantör) return false;
            if (activeFilters.Sortiment && (p.Sortiment || "").trim() !== activeFilters.Sortiment) return false;
            if (activeFilters.Godkännande && (p.Godkännande || "").trim() !== activeFilters.Godkännande) return false;
            if (searchQuery) {
                let searchStr = `${p.Produkt} ${p.Benämning} ${p["E-nummer"]} ${p.Tillverkare} ${p["Tillverkarens artikellnummer"]}`.toLowerCase();
                if (!searchStr.includes(searchQuery)) return false;
            }
            return true;
        });

        let structure = {};
        currentPool.forEach(p => {
            let hk = p.Huvudkategori ? p.Huvudkategori.trim() : "Ospecificerat";
            let k = p.Kategori ? p.Kategori.trim() : "Ospecificerat";
            let uk = p.Underkategori ? p.Underkategori.trim() : "Ospecificerat";

            if (!structure[hk]) structure[hk] = {};
            if (!structure[hk][k]) structure[hk][k] = [];
            if (!structure[hk][k].includes(uk)) structure[hk][k].push(uk);
        });

        let sortedHKs = Object.keys(structure).sort((a, b) => a.localeCompare(b, 'sv'));

        sortedHKs.forEach(hk => {
            let hkLi = document.createElement('li');
            hkLi.className = 'tree-item';
            
            const hkActive = activeFilters.Huvudkategori === hk && !activeFilters.Kategori && !activeFilters.Underkategori;
            const hkExpanded = activeFilters.Huvudkategori === hk;
            
            if (hkExpanded) hkLi.classList.add('expanded');
            hkLi.innerHTML = `<div class="tree-label ${hkActive ? 'active' : ''}"><span class="toggle-arrow">►</span> 📂 ${hk}</div>`;
            
            let hkUl = document.createElement('ul');
            hkUl.className = 'sub-menu';

            hkLi.querySelector('.tree-label').onclick = (e) => {
                e.stopPropagation();
                activeFilters.Huvudkategori = activeFilters.Huvudkategori === hk && hkActive ? null : hk;
                activeFilters.Kategori = null;
                activeFilters.Underkategori = null;
                updateUI();
            };

            let sortedKs = Object.keys(structure[hk]).sort((a, b) => a.localeCompare(b, 'sv'));

            sortedKs.forEach(k => {
                let kLi = document.createElement('li');
                kLi.className = 'tree-item';
                
                const kActive = activeFilters.Huvudkategori === hk && activeFilters.Kategori === k && !activeFilters.Underkategori;
                const kExpanded = activeFilters.Huvudkategori === hk && activeFilters.Kategori === k;

                if (kExpanded) kLi.classList.add('expanded');
                kLi.innerHTML = `<div class="tree-label ${kActive ? 'active' : ''}"><span class="toggle-arrow">►</span> 📁 ${k}</div>`;
                
                let kUl = document.createElement('ul');
                kUl.className = 'sub-menu';

                kLi.querySelector('.tree-label').onclick = (e) => {
                    e.stopPropagation();
                    activeFilters.Huvudkategori = hk;
                    activeFilters.Kategori = activeFilters.Kategori === k && kActive ? null : k;
                    activeFilters.Underkategori = null;
                    updateUI();
                };

                let sortedUKs = [...structure[hk][k]].sort((a, b) => a.localeCompare(b, 'sv'));

                sortedUKs.forEach(uk => {
                    let ukLi = document.createElement('li');
                    ukLi.className = 'tree-item';
                    const ukActive = activeFilters.Huvudkategori === hk && activeFilters.Kategori === k && activeFilters.Underkategori === uk;

                    ukLi.innerHTML = `<div class="tree-label ${ukActive ? 'active' : ''}">🔹 ${uk}</div>`;
                    ukLi.onclick = (e) => {
                        e.stopPropagation();
                        activeFilters.Huvudkategori = hk;
                        activeFilters.Kategori = k;
                        activeFilters.Underkategori = uk;
                        updateUI();
                    };
                    kUl.appendChild(ukLi);
                });

                kLi.appendChild(kUl);
                hkUl.appendChild(kLi);
            });

            hkLi.appendChild(hkUl);
            treeContainer.appendChild(hkLi);
        });
    }

    // 5b. STYR SYNLIGHETEN FÖR "RENSA FILTER"-KNAPPEN
    function handleClearButtonVisibility() {
        const clearBtn = document.getElementById('clearFilterBtn');
        if (!clearBtn) return;

        // Kontrollera om användaren har filtrerat på NÅGOT ANNAT än det förvalda Primärsortimentet
        const hasTreeFilters = activeFilters.Huvudkategori !== null || activeFilters.Kategori !== null || activeFilters.Underkategori !== null;
        const hasOtherDropdowns = activeFilters.Tillverkare !== null || activeFilters.Leverantör !== null || activeFilters.Godkännande !== null;
        
        // Knappen ska synas om Sortiment ändras från Primärsortiment (eller nollställs till null)
        const sortimentChanged = activeFilters.Sortiment !== "Primärsortiment";
        const hasSearchQuery = searchQuery.trim().length > 0;

        if (hasTreeFilters || hasOtherDropdowns || sortimentChanged || hasSearchQuery) {
            clearBtn.style.display = 'inline-block';
        } else {
            clearBtn.style.display = 'none';
        }
    }

    // 6. RENDERA PRODUKTKORT
    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';

        const filtered = getFilteredProducts();
        document.getElementById('product-count').innerText = `Visar ${filtered.length} av ${products.length} artiklar`;

        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted); font-size: 16px;">Inga produkter matchar valda filter eller sökning.</div>`;
            return;
        }

        filtered.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            
            let sortimentText = p.Sortiment && p.Sortiment.trim() !== "" ? p.Sortiment.trim() : "Övrigt sortiment";
            let isPrimar = sortimentText.toLowerCase() === "primärsortiment";
            let sortimentHtml = `<div class="sortiment-badge ${isPrimar ? 'primar-sortiment' : ''}">${sortimentText}</div>`;

            let statusText = p.Livscykelstatus && p.Livscykelstatus.trim() !== "" ? p.Livscykelstatus.trim() : "";
            let isUtgatt = statusText.toLowerCase() === "utgått";
            let statusHtml = isUtgatt ? `<div class="sortiment-badge utgatt-status">${statusText}</div>` : '';

            let bildSrc = p.Produktbild && p.Produktbild.trim() !== "" ? p.Produktbild.trim() : "";
            let bildHtml = bildSrc ? `<img src="${bildSrc}" alt="${p.Produkt || ''}">` : `<span style="font-size: 48px;">📦</span>`;

            card.innerHTML = `
                <div>
                    <div class="product-image">
                        ${bildHtml}
                    </div>
                    <div class="brand">${p.Tillverkare || 'Övrigt'}</div>
                    <div class="title" title="${p.Produkt || ''}">${p.Produkt || 'Namnlös produkt'}</div>
                    <div class="desc-preview">${p.Benämning || ''}</div>
                    
                    <div class="badge-container">
                        ${sortimentHtml}
                        ${statusHtml}
                    </div>
                </div>
                <button class="btn" onclick="openModal(${p.rowId})">Visa Produktinformation</button>
            `;
            grid.appendChild(card);
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        updateUI();
    });

    // 7. NOLLSTÄLL ALLA FILTER (Återställer även till standardläget Primärsortiment)
    function resetAllFilters() {
        searchQuery = "";
        document.getElementById('searchInput').value = "";
        
        activeFilters = { 
            Huvudkategori: null, Kategori: null, Underkategori: null,
            Tillverkare: null, Leverantör: null, Sortiment: "Primärsortiment", Godkännande: null
        };

        dropdownFields.forEach(field => {
            dropdownSearchQueries[field.key] = "";
            const inputEl = document.getElementById(`search-${field.key.replace(/[^a-zA-Z0-9]/g, '_')}`);
            if (inputEl) inputEl.value = "";
        });
        
        updateUI();
    }

    function updateUI() {
        updateAllDropdownOptions();
        buildDynamicTree();
        renderProducts();
        handleClearButtonVisibility(); 
    }

    // POPUP / MODAL-HANTERING
    function openModal(rowId) {
        const p = products.find(prod => prod.rowId === rowId);
        if (!p) return;

        document.getElementById('modalBrand').innerText = p.Tillverkare || 'Övrigt';
        document.getElementById('modalTitle').innerText = p.Produkt || 'Namnlös produkt';
        document.getElementById('modalSub').innerText = p.Benämning || '';
        document.getElementById('modalDesc').innerText = p.Beskrivning || p["Extra information"] || 'Ingen ytterligare beskrivning tillgänglig för denna artikel.';

        const imgBox = document.getElementById('modalImageBox');
        if (p.Produktbild && p.Produktbild.trim() !== "") {
            imgBox.innerHTML = `<img src="${p.Produktbild.trim()}" style="max-width:100%; max-height:100%; object-fit:contain;" alt="${p.Produkt || ''}">`;
        } else {
            imgBox.innerHTML = `<span style="font-size: 72px;">📦</span>`;
        }

        const specTable = document.getElementById('specTable');
        specTable.innerHTML = '';

        const specs = [
            { label: "E-nummer", val: p["E-nummer"] },
            { label: "Tillverkarens art.nr", val: p["Tillverkarens artikellnummer"] },
            { label: "Leverantör", val: p.Leverantör },
            { label: "Lev. Artikelnummer", val: p["Lev. Artikelnummer"] },
            { label: "Sortiment", val: p.Sortiment },
            { label: "Godkännande", val: p.Godkännande },
            { label: "Livscykelstatus", val: p.Livscykelstatus },
            { label: "Ersättande produkt", val: p["Ersättande produkt"] },
            { label: "Extra information", val: p["Extra information"] }
        ];

        specs.forEach(spec => {
            if (spec.val && spec.val.toString().trim() !== "") {
                let row = `<tr><td>${spec.label}</td><td>${spec.val}</td></tr>`;
                specTable.innerHTML += row;
            }
        });

        document.getElementById('productModal').classList.add('open');
    }

    function closeModal() { 
        document.getElementById('productModal').classList.remove('open'); 
    }

    loadData();
</script>
