<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Produktkatalog</title>
    <style>
        :root {
            --primary-color: rgb(88, 197, 202);
            --primary-dark: rgb(68, 167, 172);
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 30px 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.02);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 768px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .header-title h2 {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
        }

        .search-bar {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 24px;
            border: 2px solid var(--border-color);
            border-radius: 50px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            background: #f8fafc;
        }

        .search-bar input:focus {
            background: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(88, 197, 202, 0.15);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* Dynamiska Filterträdet */
        .sidebar {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.02);
            height: fit-content;
            max-height: 85vh;
            overflow-y: auto;
        }

        .sidebar h3 {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f5f9;
        }

        .tree-menu, .tree-menu ul {
            list-style: none;
            padding-left: 0;
        }

        .tree-item {
            margin: 4px 0;
        }

        .tree-label {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: #334155;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.15s ease;
        }

        .tree-label:hover {
            background: #f1f5f9;
        }

        .tree-label.active {
            background: rgba(88, 197, 202, 0.1);
            color: var(--primary-dark);
            font-weight: 600;
        }

        .toggle-arrow {
            margin-right: 8px;
            font-size: 11px;
            transition: transform 0.2s ease;
            display: inline-block;
            width: 12px;
        }

        .sub-menu {
            padding-left: 16px !important;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease-out;
        }

        .expanded > .sub-menu {
            max-height: 2000px;
        }

        .expanded > .tree-label .toggle-arrow {
            transform: rotate(90deg);
        }

        /* Galleri */
        .gallery-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        @media (max-width: 1300px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { .product-grid { grid-template-columns: 1fr; } }

        /* Produktkort */
        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #f1f5f9;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            border-color: rgba(88, 197, 202, 0.3);
        }

        .product-image {
            width: 100%;
            height: 180px;
            background: #f8fafc;
            border-radius: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 4px;
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .desc-preview {
            font-size: 13px;
            color: var(--text-muted);
            height: 36px;
            overflow: hidden;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .artnr {
            font-size: 12px;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }

        .btn:hover { background: var(--primary-dark); }

        /* Popup (Modal) */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1000;
        }

        .modal.open { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: white; padding: 40px; border-radius: 24px;
            max-width: 900px; width: 95%; max-height: 90vh; overflow-y: auto;
            position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px;
            transform: translateY(40px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .modal.open .modal-content { transform: translateY(0) scale(1); }

        @media (max-width: 768px) { .modal-content { grid-template-columns: 1fr; gap: 20px; } }

        .close-modal {
            position: absolute; top: 20px; right: 20px; font-size: 24px;
            cursor: pointer; border: none; background: #f1f5f9;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* Teknisk Specifikation-tabell i popupen */
        .spec-table {
            width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px;
        }
        .spec-table tr { border-bottom: 1px solid #f1f5f9; }
        .spec-table td { padding: 8px 4px; }
        .spec-table td:first-child { font-weight: 600; color: #64748b; width: 40%; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-title">
            <h2>Digital Produktkatalog</h2>
            <p id="product-count">Läser in artiklar...</p>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Sök på produkt, benämning, E-nummer, tillverkare...">
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <h3>Produktgrupper</h3>
            <ul class="tree-menu" id="dynamicTree">
                </ul>
        </aside>

        <main class="gallery-container">
            <div class="product-grid" id="productGrid"></div>
        </main>
    </div>
</div>

<div class="modal" id="productModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-modal" onclick="closeModal()">&times;</button>
        
        <div class="modal-image-box" style="background: #f8fafc; border-radius: 16px; display: flex; align-items: center; justify-content: center; height: 300px; border: 1px solid var(--border-color);">
            <span id="modalImgPlaceholder" style="font-size: 72px;">📦</span>
        </div>
        
        <div>
            <span id="modalBrand" class="brand">Tillverkare</span>
            <h2 id="modalTitle" style="margin: 5px 0 2px 0; font-size: 22px; color: #0f172a;">Produkt</h2>
            <h3 id="modalSub" style="font-size: 15px; font-weight: 500; color: var(--text-muted); margin-bottom: 15px;">Benämning</h3>
            
            <div style="border-top: 1px solid var(--border-color); padding-top: 15px;">
                <h4 style="font-size: 12px; text-transform: uppercase; color: #0f172a;">Beskrivning</h4>
                <p id="modalDesc" style="color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-top: 5px;"></p>
            </div>

            <div style="margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 15px;">
                <h4 style="font-size: 12px; text-transform: uppercase; color: #0f172a;">Teknisk Specifikation</h4>
                <table class="spec-table" id="specTable">
                    </table>
            </div>
        </div>
    </div>
</div>

<script>
    let products = [];
    let activeFilters = { Huvudkategori: null, Kategori: null, Underkategori: null };
    let searchQuery = "";

    // HÄMTA JSON-FILEN FRÅN SHAREPOINT
    function loadData() {
        // Justera denna URL så den pekar på din genererade produkter.json
        const jsonUrl = "produkter.json"; 

        fetch(jsonUrl)
            .then(res => res.json())
            .then(data => {
                products = data;
                buildTree();
                renderProducts();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('product-count').innerText = "Kunde inte ladda produktdatan.";
            });
    }

    // BYGG TRÄDET AUTOMATISKT UTIFRÅN DATA I EXCEL-FILEN
    function buildTree() {
        const treeContainer = document.getElementById('dynamicTree');
        treeContainer.innerHTML = '';

        // Lägg till "Visa alla" överst
        const allLi = document.createElement('li');
        allLi.className = 'tree-item';
        allLi.innerHTML = `<div class="tree-label active" id="btn-all">📁 Visa alla produkter</div>`;
        allLi.onclick = () => selectFilter('All', null);
        treeContainer.appendChild(allLi);

        // Strukturera data: Huvudkategori -> Kategori -> Underkategori
        let structure = {};

        products.forEach(p => {
            let hk = p.Huvudkategori || "Ospecificerat";
            let k = p.Kategori || "Ospecificerat";
            let uk = p.Underkategori || "Ospecificerat";

            if (!structure[hk]) structure[hk] = {};
            if (!structure[hk][k]) structure[hk][k] = [];
            if (!structure[hk][k].includes(uk)) structure[hk][k].push(uk);
        });

        // Generera HTML för trädet
        for (let hk in structure) {
            let hkLi = document.createElement('li');
            hkLi.className = 'tree-item';
            hkLi.innerHTML = `<div class="tree-label"><span class="toggle-arrow">►</span> 📂 ${hk}</div>`;
            
            let hkUl = document.createElement('ul');
            hkUl.className = 'sub-menu';

            hkLi.querySelector('.tree-label').onclick = (e) => {
                e.stopPropagation();
                hkLi.classList.toggle('expanded');
                selectFilter('Huvudkategori', hk, hkLi.querySelector('.tree-label'));
            };

            for (let k in structure[hk]) {
                let kLi = document.createElement('li');
                kLi.className = 'tree-item';
                kLi.innerHTML = `<div class="tree-label"><span class="toggle-arrow">►</span> 📁 ${k}</div>`;
                
                let kUl = document.createElement('ul');
                kUl.className = 'sub-menu';

                kLi.querySelector('.tree-label').onclick = (e) => {
                    e.stopPropagation();
                    kLi.classList.toggle('expanded');
                    selectFilter('Kategori', k, kLi.querySelector('.tree-label'));
                };

                structure[hk][k].forEach(uk => {
                    let ukLi = document.createElement('li');
                    ukLi.className = 'tree-item';
                    ukLi.innerHTML = `<div class="tree-label">🔹 ${uk}</div>`;
                    ukLi.onclick = (e) => {
                        e.stopPropagation();
                        selectFilter('Underkategori', uk, ukLi.querySelector('.tree-label'));
                    };
                    kUl.appendChild(ukLi);
                });

                kLi.appendChild(kUl);
                hkUl.appendChild(kLi);
            }

            hkLi.appendChild(hkUl);
            treeContainer.appendChild(hkLi);
        }
    }

    function selectFilter(level, value, element) {
        document.querySelectorAll('.tree-label').forEach(el => el.classList.remove('active'));
        
        if (level === 'All') {
            activeFilters = { Huvudkategori: null, Kategori: null, Underkategori: null };
            document.getElementById('btn-all').classList.add('active');
        } else if (level === 'Huvudkategori') {
            activeFilters = { Huvudkategori: value, Kategori: null, Underkategori: null };
            element.classList.add('active');
        } else if (level === 'Kategori') {
            activeFilters = { Huvudkategori: null, Kategori: value, Underkategori: null };
            element.classList.add('active');
        } else if (level === 'Underkategori') {
            activeFilters = { Huvudkategori: null, Kategori: null, Underkategori: value };
            element.classList.add('active');
        }
        renderProducts();
    }

    // RENDERA ALLA PRODUKTKORT
    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';

        let filtered = products.filter(p => {
            // Filterträd-logik
            if (activeFilters.Huvudkategori && p.Huvudkategori !== activeFilters.Huvudkategori) return false;
            if (activeFilters.Kategori && p.Kategori !== activeFilters.Kategori) return false;
            if (activeFilters.Underkategori && p.Underkategori !== activeFilters.Underkategori) return false;

            // Sökfälts-logik
            if (searchQuery) {
                let searchStr = `${p.Produkt} ${p.Benämning} ${p["E-nummer"]} ${p.Tillverkare} ${p["Tillverkarens artikellnummer"]}`.toLowerCase();
                if (!searchStr.includes(searchQuery)) return false;
            }
            return true;
        });

        document.getElementById('product-count').innerText = `Visar ${filtered.length} av ${products.length} artiklar`;

        filtered.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div>
                    <div class="brand">${p.Tillverkare || 'Övrigt'}</div>
                    <div class="title">${p.Produkt}</div>
                    <div class="desc-preview">${p.Benämning || ''}</div>
                    ${p["E-nummer"] ? `<div class="artnr">E-nr: ${p["E-nummer"]}</div>` : (p["Tillverkarens artikellnummer"] ? `<div class="artnr">Art.nr: ${p["Tillverkarens artikellnummer"]}</div>` : '<div style="height:34px"></div>')}
                </div>
                <button class="btn" onclick="openModal(${p.rowId})">Visa Produktinformation</button>
            `;
            grid.appendChild(card);
        });
    }

    // REALTIOSSÖKNING
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderProducts();
    });

    // ÖPPNA POPUPEN OCH GENERERA TEKNISK DATA
    function openModal(rowId) {
        const p = products.find(prod => prod.rowId === rowId);
        if (!p) return;

        document.getElementById('modalBrand').innerText = p.Tillverkare || 'Övrigt';
        document.getElementById('modalTitle').innerText = p.Produkt;
        document.getElementById('modalSub').innerText = p.Benämning || '';
        document.getElementById('modalDesc').innerText = p.Beskrivning || p["Extra information"] || 'Ingen ytterligare beskrivning tillgänglig.';

        // Bygg tabellen med övriga kolumner som inte visas på framsidan
        const specTable = document.getElementById('specTable');
        specTable.innerHTML = '';

        const specs = [
            { label: "E-nummer", val: p["E-nummer"] },
            { label: "Tillverkarens art.nr", val: p["Tillverkarens artikellnummer"] },
            { label: "Lev. Artikelnummer", val: p["Lev. Artikelnummer"] },
            { label: "Sortiment", val: p.Sortiment },
            { label: "Godkännande", val: p.Godkännande },
            { label: "Livscykelstatus", val: p.Livscykelstatus },
            { label: "Ersättande produkt", val: p["Ersättande produkt"] },
            { label: "Extra information", val: p["Extra information"] }
        ];

        specs.forEach(spec => {
            if (spec.val) {
                let row = `<tr><td>${spec.label}</td><td>${spec.val}</td></tr>`;
                specTable.innerHTML += row;
            }
        });

        document.getElementById('productModal').classList.add('open');
    }

    function closeModal() { document.getElementById('productModal').classList.remove('open'); }

    // Starta laddning
    loadData();
</script>

</body>
</html>
