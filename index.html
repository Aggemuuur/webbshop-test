<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Produktkatalog</title>
<style>
:root {
--primary-color: rgb(88, 197, 202);
--primary-dark: rgb(68, 167, 172);
--bg-color: #f4f7f9;
--card-bg: #ffffff;
--text-color: #1e293b;
--text-muted: #64748b;
--border-color: #e2e8f0;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

body {
background-color: var(--bg-color);
color: var(--text-color);
padding: 30px 20px;
}

.container {
max-width: 1400px;
margin: 0 auto;
}

/* Header & Sök */
header {
background: var(--card-bg);
padding: 30px;
border-radius: 20px;
box-shadow: 0 4px 25px rgba(0, 0, 0, 0.02);
margin-bottom: 30px;
display: flex;
flex-direction: column;
gap: 20px;
}

@media (min-width: 768px) {
header {
flex-direction: row;
justify-content: space-between;
align-items: center;
}
}

.header-title h2 {
font-size: 24px;
font-weight: 700;
color: #0f172a;
}

.header-title p {
font-size: 14px;
color: var(--text-muted);
margin-top: 4px;
}

.search-bar {
position: relative;
width: 100%;
max-width: 500px;
}

.search-bar input {
width: 100%;
padding: 14px 24px;
border: 2px solid var(--border-color);
border-radius: 50px;
font-size: 15px;
transition: all 0.3s ease;
outline: none;
background: #f8fafc;
}

.search-bar input:focus {
background: #fff;
border-color: var(--primary-color);
box-shadow: 0 0 0 4px rgba(88, 197, 202, 0.15);
}

/* Layout Uppdelning */
.main-layout {
display: grid;
grid-template-columns: 280px 1fr;
gap: 30px;
}

@media (max-width: 992px) {
.main-layout {
grid-template-columns: 1fr;
}
}

/* Filterträd / Sidomeny */
.sidebar {
background: var(--card-bg);
padding: 24px;
border-radius: 20px;
box-shadow: 0 4px 25px rgba(0, 0, 0, 0.02);
height: fit-content;
}

.sidebar h3 {
font-size: 16px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 0.5px;
margin-bottom: 20px;
padding-bottom: 10px;
border-bottom: 2px solid #f1f5f9;
}

.tree-menu {
list-style: none;
}

.tree-item {
margin: 6px 0;
font-size: 15px;
}

.tree-label {
display: flex;
align-items: center;
padding: 10px 14px;
border-radius: 10px;
cursor: pointer;
color: #334155;
font-weight: 500;
transition: all 0.2s ease;
}

.tree-label:hover {
background: #f1f5f9;
color: #000;
}

.tree-label.active {
background: rgba(88, 197, 202, 0.1);
color: var(--primary-dark);
font-weight: 600;
}

.tree-icon {
margin-right: 10px;
font-size: 16px;
}

.sub-menu {
list-style: none;
padding-left: 24px;
margin-top: 4px;
}

/* Produktgalleri (3 Kolumner) */
.gallery-container {
display: flex;
flex-direction: column;
gap: 20px;
}

.gallery-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 0 5px;
}

#product-count {
font-size: 15px;
font-weight: 600;
color: var(--text-muted);
}

.product-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 25px;
}

@media (max-width: 1200px) {
.product-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 650px) {
.product-grid { grid-template-columns: 1fr; }
}

/* Produktkort */
.product-card {
background: var(--card-bg);
border-radius: 20px;
padding: 24px;
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
display: flex;
flex-direction: column;
justify-content: space-between;
position: relative;
transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease, border-color 0.3s ease;
border: 1px solid #f1f5f9;
}

.product-card:hover {
transform: translateY(-6px);
box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
border-color: rgba(88, 197, 202, 0.3);
}

.badge {
position: absolute;
top: 20px;
left: 20px;
background: var(--primary-color);
color: white;
padding: 5px 12px;
border-radius: 30px;
font-size: 11px;
font-weight: 700;
letter-spacing: 0.5px;
z-index: 2;
box-shadow: 0 2px 10px rgba(88, 197, 202, 0.2);
}

.product-image {
width: 100%;
height: 200px;
background: #f8fafc;
border-radius: 14px;
margin-bottom: 20px;
display: flex;
align-items: center;
justify-content: center;
transition: background 0.2s ease;
}

.product-card:hover .product-image {
background: #f1f5f9;
}

.brand {
font-size: 11px;
text-transform: uppercase;
font-weight: 700;
color: var(--primary-dark);
letter-spacing: 0.8px;
margin-bottom: 6px;
}

.title {
font-size: 16px;
font-weight: 600;
color: #0f172a;
margin-bottom: 8px;
line-height: 1.4;
height: 44px;
overflow: hidden;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
}

.artnr {
font-size: 13px;
color: var(--text-muted);
margin-bottom: 20px;
}

.btn {
background: var(--primary-color);
color: white;
border: none;
padding: 12px 20px;
border-radius: 50px;
font-weight: 600;
font-size: 14px;
cursor: pointer;
width: 100%;
transition: all 0.2s ease;
text-align: center;
box-shadow: 0 4px 12px rgba(88, 197, 202, 0.15);
}

.btn:hover {
background: var(--primary-dark);
box-shadow: 0 6px 16px rgba(88, 197, 202, 0.25);
}

/* Produktsida / Popup (Modal) Bakgrund */
.modal {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(15, 23, 42, 0.4);
backdrop-filter: blur(8px);
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
pointer-events: none;
transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
z-index: 1000;
}

/* När popupen aktiveras/öppnas */
.modal.open {
opacity: 1;
pointer-events: auto;
}

/* Själva popup-kortet */
.modal-content {
background: white;
padding: 40px;
border-radius: 24px;
max-width: 800px;
width: 90%;
position: relative;
box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
display: grid;
grid-template-columns: 1.2fr 1fr;
gap: 40px;
transform: translateY(40px) scale(0.95);
transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

/* Animationen när kortet skjuts upp */
.modal.open .modal-content {
transform: translateY(0) scale(1);
}

@media (max-width: 768px) {
.modal-content {
grid-template-columns: 1fr;
padding: 30px 24px;
gap: 24px;
max-height: 90vh;
overflow-y: auto;
}
}

/* Stängknapp */
.close-modal {
position: absolute;
top: 20px;
right: 20px;
font-size: 24px;
cursor: pointer;
border: none;
background: #f1f5f9;
color: var(--text-muted);
width: 40px;
height: 40px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s ease;
z-index: 10;
}

.close-modal:hover {
background: #e2e8f0;
color: #0f172a;
transform: rotate(90deg);
}

.modal-image-box {
background: #f8fafc;
border-radius: 16px;
display: flex;
align-items: center;
justify-content: center;
height: 320px;
border: 1px solid var(--border-color);
}
</style>
</head>
<body>

<div class="container">
<header>
<div class="header-title">
<h2>Digital Produktkatalog</h2>
<p>Internportal för organisationen</p>
</div>
<div class="search-bar">
<input type="text" id="searchInput" placeholder="Sök bland 50 000 produkter, art.nr eller märke...">
</div>
</header>

<div class="main-layout">

<span class="tree-icon">📁</span> Visa alla
</div>
</li>
<li class="tree-item">
<div class="tree-label" style="cursor: default; background: none; font-weight: 700;">
<span class="tree-icon">▼</span> Inbrottslarm
</div>
<ul class="sub-menu">
<li class="tree-item">
<div class="tree-label" id="label-ajax" onclick="filterCategory('Ajax Systems', 'label-ajax')">

</li>
<li class="tree-item">
<div class="tree-label" id="label-teletec" onclick="filterCategory('Teletec', 'label-teletec')">

</div>
</li>
</ul>
</li>
<li class="tree-item" style="margin-top: 10px;">
<div class="tree-label" style="cursor: default; background: none; font-weight: 700;">
<span class="tree-icon">▼</span> Övrigt
</div>
<ul class="sub-menu">
<li class="tree-item">
<div class="tree-label" id="label-comp" onclick="filterCategory('Komponenter', 'label-comp')">
<span class="tree-icon">🔹</span> Komponenter
</div>
</li>
</ul>
</li>
</ul>
</aside>

<main class="gallery-container">
<div class="gallery-header">
<span id="product-count">Laddar produkter...</span>
</div>

<div class="product-grid" id="productGrid">
</div>
</main>
</div>
</div>

<div class="modal" id="productModal" onclick="closeModalOnOutsideClick(event)">
<div class="modal-content" onclick="event.stopPropagation()">
<button class="close-modal" onclick="closeModal()">×</button>

<div class="modal-image-box">
<span style="font-size: 72px;">📦</span>
</div>

<div style="display: flex; flex-direction: column; justify-content: center;">
<span id="modalBrand" class="brand">Märke</span>
<h2 id="modalTitle" style="margin: 10px 0; font-size: 24px; font-weight: 700; color: #0f172a; line-height: 1.3;">Produktnamn</h2>
<p id="modalArtnr" class="artnr">Art.nr: -</p>

<div style="margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px;">
<h4 style="font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; color: #0f172a;">Beskrivning</h4>
<p id="modalDesc" style="color: var(--text-muted); font-size: 15px; line-height: 1.6;">
Information laddas...
</p>
</div>
</div>
</div>
</div>
